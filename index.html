<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>새신자교육_학사일정</title>
<style>
  :root{
    --bg:#f5f6f8;
    --card:#ffffff;
    --border:#e2e5ea;
    --text:#1f2430;
    --muted:#9aa1ac;
    --accent:#3b6ef6;
    --today:#fff4e0;
    --sun:#e0523f;
    --sat:#3b6ef6;
    --season-a:#eef1f6;
    --season-b:#e4e8f0;
    --season-accent:#3b6ef6;
  }
  /* 계절/월별 색상은 아래 스크립트의 MONTHS 테이블에서 JS로 직접 지정됩니다. */

  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:"Pretendard","Malgun Gothic","Apple SD Gothic Neo",sans-serif;
    background:linear-gradient(160deg, var(--season-a), var(--season-b) 55%, var(--bg) 100%);
    background-attachment:fixed;
    transition:background 0.8s ease;
    color:var(--text);
    padding:20px 14px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
  }
  .wrap{max-width:1800px;width:100%;margin:0 auto;display:flex;gap:24px;align-items:stretch;flex:1;min-height:0;}
  .main-col{flex:1;min-width:0;min-height:0;display:flex;flex-direction:column;}
  .sidebar{width:260px;flex-shrink:0;display:flex;flex-direction:column;}
  .header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:20px;
  }
  .title-group{display:flex;align-items:center;gap:14px;}
  .season-badge{font-size:30px;line-height:1;align-self:center;}
  .header h1{font-size:26px;margin:0;font-weight:800;}
  .title-divider{width:2px;align-self:stretch;background:var(--border);}
  .term-label{font-size:26px;font-weight:800;color:#1e3a5f;}
  .nav-btns button{
    border:1px solid var(--border);
    background:var(--card);
    border-radius:6px;
    padding:5px 10px;
    font-size:12px;
    cursor:pointer;
    margin-left:6px;
  }
  .nav-btns button:hover{background:var(--season-a);border-color:var(--season-accent);}

  .term-bar{display:flex;gap:14px;flex-wrap:wrap;align-items:stretch;margin-bottom:20px;}
  .term-picker{
    display:inline-flex;
    align-items:center;
    gap:10px;
    background:var(--card);
    border:2px solid var(--season-accent);
    border-radius:12px;
    padding:12px 16px;
    font-size:16px;
    box-shadow:0 6px 18px rgba(0,0,0,.06);
    transition:border-color 0.8s ease;
    box-sizing:border-box;
  }
  .term-picker.term-picker-fixed{
    flex:1 1 400px;
    min-width:400px;
    justify-content:space-between;
    white-space:nowrap;
  }
  .term-picker label{font-weight:800;color:var(--text);white-space:nowrap;}
  .term-picker input[type="date"]{
    border:none;
    font-size:17px;
    font-weight:700;
    font-family:inherit;
    color:var(--season-accent);
    background:transparent;
    cursor:pointer;
    transition:color 0.8s ease;
    white-space:nowrap;
  }
  .term-picker.tentative-picker{
    border-style:dashed;
    border-color:var(--muted);
  }
  .term-picker.tentative-picker label{color:var(--muted);}
  .term-picker.tentative-picker input[type="date"]{color:var(--muted);}
  .term-clear{
    border:1px solid var(--border);
    background:transparent;
    border-radius:6px;
    padding:6px 12px;
    font-size:13px;
    color:var(--muted);
    cursor:pointer;
    white-space:nowrap;
    flex-shrink:0;
  }
  .term-clear:hover{background:#f2f3f6;}

  .term-picker.confirmed-list-box{
    width:100%;
    flex-direction:column;
    align-items:flex-start;
    gap:12px;
    box-sizing:border-box;
  }
  .confirmed-list-box .confirmed-list-label{
    font-weight:800;
    color:var(--text);
    flex-shrink:0;
  }
  .confirmed-sync-status{
    font-size:11px;
    color:var(--muted);
  }
  .add-extra-row{
    display:flex;
    gap:6px;
    align-items:center;
    flex-wrap:wrap;
    width:100%;
  }
  .add-extra-row select,
  .add-extra-row input[type="date"]{
    border:1px solid var(--border);
    border-radius:6px;
    padding:6px 8px;
    font-size:13px;
    font-family:inherit;
    color:var(--text);
    background:var(--card);
  }
  .term-add{
    border:none;
    background:var(--season-accent);
    color:#fff;
    border-radius:8px;
    padding:8px 14px;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
    white-space:nowrap;
    flex-shrink:0;
    transition:background 0.8s ease;
  }
  .term-add:hover{filter:brightness(1.08);}

  .confirmed-list{display:flex;gap:8px;flex-wrap:wrap;}
  .confirmed-chip{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:20px;
    padding:5px 8px 5px 12px;
    font-size:13px;
    font-weight:600;
    color:var(--text);
  }
  .confirmed-chip button{
    border:none;
    background:#eceff3;
    color:var(--muted);
    width:18px;
    height:18px;
    line-height:18px;
    border-radius:50%;
    font-size:12px;
    cursor:pointer;
    padding:0;
  }
  .confirmed-chip button:hover{background:var(--sun);color:#fff;}

  .list-toggle-btn{
    border:1px dashed var(--border);
    background:transparent;
    color:var(--muted);
    border-radius:20px;
    padding:5px 14px;
    font-size:12px;
    font-weight:700;
    cursor:pointer;
    font-family:inherit;
  }
  .list-toggle-btn:hover{background:#f2f3f6;color:var(--text);}

  .legend{display:flex;gap:14px;margin-bottom:14px;flex-wrap:wrap;}
  .legend-item{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);}
  .legend-dot{width:10px;height:10px;border-radius:50%;}

  .term-filter{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  .term-filter label{
    display:flex;
    align-items:center;
    gap:6px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:8px;
    padding:5px 10px;
    font-size:12px;
    font-weight:600;
    color:var(--text);
    cursor:pointer;
  }
  .term-filter input[type="checkbox"]{cursor:pointer;}
  .term-filter label.term-filter-off{color:var(--muted);}

  .calendar{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 12px 32px rgba(20,25,40,.07);
    flex:1;
    min-height:0;
    display:flex;
    flex-direction:column;
  }
  .weekdays{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    background:linear-gradient(to bottom, var(--season-a), #fafbfc 120%);
    border-bottom:1px solid var(--border);
    transition:background 0.8s ease;
    flex-shrink:0;
  }
  .weekdays div{
    text-align:center;
    padding:10px 0;
    font-size:13px;
    font-weight:700;
    color:var(--muted);
  }
  .weekdays div:first-child{color:var(--sun);}
  .weekdays div:last-child{color:var(--sat);}

  .grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    grid-auto-rows:minmax(165px,auto);
    flex:1;
    min-height:0;
  }
  .cell{
    display:flex;
    flex-direction:column;
    border-right:1px solid var(--border);
    border-bottom:1px solid var(--border);
    padding:8px 8px 8px;
    position:relative;
    overflow:visible;
    min-width:0;
  }
  .cell:nth-child(7n){border-right:none;}
  .cell.other-month{background:#fbfbfc;}
  .cell.other-month .date-num{color:#d3d6db;}
  .cell.today{
    background:var(--today);
    box-shadow:inset 0 0 0 2px var(--season-accent);
    transition:box-shadow 0.8s ease;
  }

  .date-row{display:flex;align-items:baseline;gap:5px;min-width:0;}
  .date-num{
    font-size:14px;
    font-weight:700;
    color:var(--text);
    flex-shrink:0;
  }
  .cell.sunday .date-num{color:var(--sun);}
  .cell.saturday .date-num{color:var(--sat);}

  .holiday-label{
    font-size:10px;
    font-weight:700;
    color:var(--sun);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    min-width:0;
  }

  .events{margin-top:6px;flex:1;display:flex;flex-direction:column;gap:6px;min-width:0;}
  .event{
    position:relative;
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:2px;
    text-align:center;
    padding:8px;
    border-radius:14px;
    color:#fff;
    cursor:default;
    min-width:0;
    overflow:hidden;
    isolation:isolate;
  }
  .event::before{
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(165deg, rgba(255,255,255,.32), rgba(255,255,255,0) 50%);
    pointer-events:none;
  }
  .event-icon{
    position:absolute;
    top:7px;
    left:9px;
    font-size:16px;
    line-height:1;
    opacity:.85;
  }
  .event-cat{
    font-weight:800;
    letter-spacing:-.5px;
    opacity:.95;
  }
  .event-line{
    display:flex;
    align-items:baseline;
    justify-content:center;
    gap:5px;
    white-space:nowrap;
    max-width:100%;
  }
  .event-line .event-cat{
    letter-spacing:-.2px;
    opacity:1;
    overflow:hidden;
    text-overflow:ellipsis;
    min-width:0;
    flex-shrink:1;
  }
  .event-line .round-num{
    font-weight:800;
    letter-spacing:-.5px;
    flex-shrink:0;
  }
  .event-line .round-unit{
    font-weight:600;
    opacity:.88;
    flex-shrink:0;
  }
  .event-solo{
    font-weight:800;
  }
  .event-term{
    font-size:9px;
    font-weight:600;
    opacity:.8;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width:100%;
    margin-top:1px;
  }

  /* 하루에 몰린 일정 개수(events의 data-count)에 따라 글씨 크기를 자동 조절
     — 1개뿐이면 칸을 꽉 채우게 크게, 여러 개가 겹치면 그만큼 작게 */
  .events[data-count="1"] .event-line .event-cat{ font-size:22px; }
  .events[data-count="1"] .round-num{ font-size:32px; }
  .events[data-count="1"] .round-unit{ font-size:16px; }
  .events[data-count="1"] .event-solo{ font-size:32px; }
  .events[data-count="1"] .event-icon{ font-size:20px; }

  .events[data-count="2"] .event-line .event-cat{ font-size:15px; }
  .events[data-count="2"] .round-num{ font-size:19px; }
  .events[data-count="2"] .round-unit{ font-size:12px; }
  .events[data-count="2"] .event-solo{ font-size:19px; }
  .events[data-count="2"] .event-icon{ font-size:15px; }

  .events[data-count="3"] .event-line .event-cat{ font-size:12px; }
  .events[data-count="3"] .round-num{ font-size:14px; }
  .events[data-count="3"] .round-unit{ font-size:9px; }
  .events[data-count="3"] .event-solo{ font-size:14px; }
  .events[data-count="3"] .event-icon{ font-size:11px; top:4px; left:6px; }
  .events[data-count="3"] .event-term{ display:none; } /* 박스가 너무 작아지면 개강반 표시는 생략 */
  .event.tentative::before{ display:none; }
  .event.other-term::before{ display:none; }
  .tentative-badge{
    position:absolute;
    top:6px;
    right:8px;
    font-size:10px;
    font-weight:800;
    letter-spacing:.2px;
    padding:1px 6px;
    border-radius:6px;
  }
  .event-exclude-btn{
    position:absolute;
    bottom:6px;
    right:6px;
    width:20px;
    height:20px;
    line-height:18px;
    padding:0;
    border:none;
    border-radius:50%;
    background:rgba(0,0,0,.28);
    color:#fff;
    font-size:13px;
    font-weight:800;
    cursor:pointer;
    opacity:0;
    transition:opacity 0.15s ease;
  }
  .event:hover .event-exclude-btn{ opacity:1; }
  .event-exclude-btn:hover{ background:var(--sun); }

  .event-move-btn{
    position:absolute;
    bottom:6px;
    left:6px;
    width:20px;
    height:20px;
    line-height:18px;
    padding:0;
    border:none;
    border-radius:50%;
    background:rgba(0,0,0,.28);
    color:#fff;
    font-size:12px;
    font-weight:800;
    cursor:pointer;
    opacity:0;
    transition:opacity 0.15s ease;
  }
  .event:hover .event-move-btn{ opacity:1; }
  .event-move-btn:hover{ background:var(--season-accent); }

  .move-banner{
    display:none;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    background:var(--season-accent);
    color:#fff;
    padding:9px 16px;
    border-radius:10px;
    font-size:13px;
    font-weight:700;
    margin-bottom:14px;
  }
  .move-banner button{
    border:none;
    background:rgba(255,255,255,.25);
    color:#fff;
    border-radius:6px;
    padding:4px 12px;
    font-size:12px;
    font-weight:700;
    cursor:pointer;
    white-space:nowrap;
  }
  .move-banner button:hover{ background:rgba(255,255,255,.42); }

  .grid.move-mode .cell{ cursor:pointer; }
  .grid.move-mode .cell:hover{ outline:2px solid var(--season-accent); outline-offset:-2px; }

  .decor{
    position:fixed;
    inset:0;
    overflow:hidden;
    pointer-events:none;
    z-index:0;
  }
  .particle{
    position:absolute;
    top:0;
    will-change:transform,opacity;
    user-select:none;
  }
  .fall-particle{ animation-name:fall-drift; animation-timing-function:linear; animation-iteration-count:infinite; }
  .rise-particle{ animation-name:rise-drift; animation-timing-function:linear; animation-iteration-count:infinite; }
  @keyframes fall-drift{
    0%{ transform:translateY(-10vh) translateX(0) rotate(0deg); opacity:0; }
    10%{ opacity:.8; }
    90%{ opacity:.8; }
    100%{ transform:translateY(110vh) translateX(var(--drift,30px)) rotate(300deg); opacity:0; }
  }
  @keyframes rise-drift{
    0%{ transform:translateY(10vh) translateX(0); opacity:0; }
    10%{ opacity:.75; }
    90%{ opacity:.75; }
    100%{ transform:translateY(-110vh) translateX(var(--drift,20px)); opacity:0; }
  }

  .wave-wrap{
    position:fixed;
    left:0; right:0; bottom:0;
    height:150px;
    overflow:hidden;
    pointer-events:none;
    z-index:0;
    display:none;
  }
  .wave-svg{
    position:absolute;
    bottom:-2px;
    left:0;
    width:200%;
    height:100%;
    animation:wave-scroll 16s linear infinite;
  }
  .wave-svg.wave-back{ animation-duration:24s; }
  @keyframes wave-scroll{ from{ transform:translateX(0); } to{ transform:translateX(-50%); } }

  @media (prefers-reduced-motion: reduce){
    .particle, .wave-svg{ animation:none !important; opacity:0 !important; }
  }

  .wrap{position:relative;z-index:1;}

  @media (max-width:900px){
    .wrap{flex-direction:column;}
    .sidebar{width:100%;position:static;}
  }

  @media print{
    body{padding:0;background:#fff;height:auto;overflow:visible;}
    .wrap{height:auto;}
    .main-col{min-height:auto;}
    .calendar{flex:none;min-height:auto;}
    .nav-btns{display:none;}
    .grid{grid-auto-rows:140px;grid-template-rows:none !important;flex:none;min-height:auto;}
    .decor, .wave-wrap{display:none !important;}
    .sidebar{display:none;}
  }
</style>
</head>
<body>
<div class="decor" id="decor"></div>
<div class="wave-wrap" id="waveWrap">
  <svg class="wave-svg wave-back" viewBox="0 0 2400 150" preserveAspectRatio="none">
    <path d="M0,90 C150,150 350,30 600,90 C850,150 1050,30 1200,90 C1350,150 1550,30 1800,90 C1950,150 2150,30 2400,90 L2400,150 L0,150 Z" fill="var(--season-accent)" opacity="0.18"/>
  </svg>
  <svg class="wave-svg wave-front" viewBox="0 0 2400 150" preserveAspectRatio="none">
    <path d="M0,105 C150,150 350,60 600,105 C850,150 1050,60 1200,105 C1350,150 1550,60 1800,105 C1950,150 2150,60 2400,105 L2400,150 L0,150 Z" fill="var(--season-accent)" opacity="0.3"/>
  </svg>
</div>
<div class="wrap">
  <div class="main-col">
    <div class="header">
      <div class="title-group">
        <span class="season-badge" id="seasonBadge"></span>
        <h1 id="title"></h1>
        <span class="title-divider"></span>
        <span class="term-label" id="termLabel"></span>
      </div>
      <div class="nav-btns">
        <button onclick="changeMonth(-1)">◀ 이전달</button>
        <button onclick="changeMonth(1)">다음달 ▶</button>
        <button onclick="exportImage()">🖼 이미지 저장</button>
      </div>
    </div>

    <div class="term-bar">
      <div class="term-picker term-picker-fixed">
        <label for="confirmedInput">확정 종강일 추가</label>
        <input type="date" id="confirmedInput">
        <button class="term-add" onclick="addConfirmed()">확정 추가</button>
      </div>
      <div class="term-picker tentative-picker term-picker-fixed">
        <label for="plannedInput">예정 종강일</label>
        <input type="date" id="plannedInput">
        <button class="term-clear" onclick="clearPlanned()">지우기</button>
      </div>
    </div>

    <div class="legend" id="legend"></div>
    <div class="term-filter" id="termFilter"></div>

    <div class="move-banner" id="moveBanner">
      <span id="moveBannerText"></span>
      <button onclick="cancelMove()">취소 (Esc)</button>
    </div>

    <div class="calendar">
      <div class="weekdays">
        <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
      </div>
      <div class="grid" id="grid"></div>
    </div>
  </div>

  <aside class="sidebar">
    <div class="term-picker confirmed-list-box">
      <span class="confirmed-list-label">확정된 종강일</span>
      <div class="confirmed-list" id="confirmedList"></div>
      <span class="confirmed-sync-status" id="confirmedSyncStatus"></span>
    </div>
    <div class="term-picker confirmed-list-box">
      <span class="confirmed-list-label">회차 추가</span>
      <div class="add-extra-row">
        <select id="addExtraCategory">
          <option value="주일예배">주일예배</option>
          <option value="새신자교육" selected>새신자교육</option>
          <option value="새신자 예배">새신자 예배</option>
          <option value="서류완료">서류완료</option>
        </select>
        <select id="addExtraTermEnd"></select>
        <input type="date" id="addExtraInput">
        <button class="term-add" onclick="addExtraEvent()">추가</button>
      </div>
      <div class="confirmed-list" id="addedList"></div>
      <span class="confirmed-sync-status">먼저 어느 기수인지 선택 후 날짜 추가. 예: 화요일 회차가 월요일로 당겨진 경우 등 — 추가된 날짜는 그 기수의 기존 회차와 날짜순으로 합쳐져 다시 번호가 매겨짐. 회차를 뺀 뒤 복원하고 싶을 때도 여기서 같은 날짜를 다시 추가하면 됨</span>
    </div>
  </aside>
</div>

<script>
/* ══════════════════════════════════════════════
   여기만 바꾸면 됩니다. (종강일 기준 자동 계산)
   ══════════════════════════════════════════════ */

// 1) 표시할 연/월 (month는 1~12) — 처음 열었을 때 보여줄 달
let YEAR = 2026;
let MONTH = 8;

// 2) 종강일 — 위쪽 "확정/예정 종강일" 선택기로 바꿀 수 있습니다.
//    확정은 여러 기수를 계속 추가할 수 있습니다.
//    예정은 저장되지 않는 임시 계산용(다음 기수 미리보기)이라 하나만 유지됩니다.

// 2-1) 확정 종강일을 여러 사람과 공유하려면, Apps Script 웹앱 배포 후 그 URL을 여기 붙여넣으세요.

// JSONP 요청 헬퍼 — file:// 로컬 HTML에서는 fetch로 외부(구글 Apps Script) API를
// 부를 때 CORS에 막히므로, <script> 태그로 불러오는 JSONP 방식을 씀.
function jsonpRequest(url){
  return new Promise((resolve, reject) => {
    const cbName = '__jsonp_' + Date.now() + '_' + Math.floor(Math.random()*1e6);
    const script = document.createElement('script');
    const cleanup = () => { delete window[cbName]; script.remove(); };
    window[cbName] = (data) => { cleanup(); resolve(data); };
    script.onerror = () => { cleanup(); reject(new Error('요청 실패(네트워크/URL 확인)')); };
    script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cbName;
    document.body.appendChild(script);
  });
}

// 신년도 표기 오프셋(신 N년 = 서기 - SINYEAR_OFFSET) 및 개강반 표기까지의 개월 수
const SINYEAR_OFFSET = 1983;
const CLASS_DURATION_MONTHS = 8; // 기준 달(종강 등) 기준, 몇 개월 전이 개강월인지

// "YYYY년 M월" 기준으로 그 몇 개월 전(CLASS_DURATION_MONTHS)이 개강월인지 계산해
// "신 N(YYYY)년 M월 개강반" 문자열을 만든다. 헤더(현재 표시 월 기준)와 각 이벤트
// 박스(그 이벤트가 속한 기수의 종강월 기준) 양쪽에서 공용으로 사용.
function classStartLabel(year, month){
  const classStart = new Date(year, month-1 - CLASS_DURATION_MONTHS, 1);
  const cy = classStart.getFullYear();
  const cm = classStart.getMonth() + 1;
  return `신 ${cy - SINYEAR_OFFSET}(${cy})년 ${cm}월 개강반`;
}

// classStartLabel과 같은 계산으로 "YYYY-M" 키만 반환 — 두 개강반이 같은 기수인지
// 비교할 때 사용(화면에 보이는 달의 "메인 개강반"과 각 이벤트의 개강반이 같은지 판별).
function classStartKey(year, month){
  const classStart = new Date(year, month-1 - CLASS_DURATION_MONTHS, 1);

}

const shadeColor = (hex, percent) => {
  const num = parseInt(hex.slice(1), 16);
  const amt = Math.round(2.55 * percent);
  const clamp = v => Math.max(Math.min(255, v), 0);
  const r = clamp((num >> 16) + amt), g = clamp(((num >> 8) & 0xff) + amt), b = clamp((num & 0xff) + amt);
  return `#${(0x1000000 + r*0x10000 + g*0x100 + b).toString(16).slice(1)}`;
};
const hexToRgba = (hex, alpha) => {
  const num = parseInt(hex.slice(1), 16);
  return `rgba(${(num>>16)&0xff},${(num>>8)&0xff},${num&0xff},${alpha})`;
};

const parseLocalDate = s => { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); };
const fmtDateLocal = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const addDays = (d, n) => { const r = new Date(d); r.setDate(r.getDate()+n); return r; };

// 자동 계산된 날짜(rawDateStrs)에서 제외된 날짜는 빼고, 수동으로 추가된(ADDED_DATES) 같은
// 카테고리의 날짜는 끼워넣은 뒤, 날짜순으로 정렬해서 1회차부터 다시 번호를 매겨 events에 추가.
// termEnd로 "이 기수(종강일)에 속한 제외/추가만" 반영 — 다른 기수의 제외/추가가 섞여 들어가지 않게 함.
// solo=true면 회차 번호를 매기지 않음(종강일 기준 하루뿐인 서류완료 같은 단독 일정 이동용).
function pushRoundedEvents_(events, rawDateStrs, category, tentative, termEnd, solo){
  const kept = rawDateStrs.filter(ds => !EXCLUDED_DATES.some(x => x.date === ds && x.termEnd === termEnd));
  const added = ADDED_DATES.filter(a => a.category === category && a.termEnd === termEnd).map(a => a.date);
  const merged = Array.from(new Set([...kept, ...added])).sort();
  merged.forEach((ds, idx) => {
    events.push({ date: ds, category, round: solo ? null : idx+1, tentative, termEnd });
  });
}

function computeEvents(termEndStr, tentative){
  const termEndDate = parseLocalDate(termEndStr);
  const events = [];

  // 종강일이 속한 주의 일요일 (종강일 당일 포함, 그 이전 가장 가까운 일요일) — 주일예배 계산용
  const worshipWeekSunday = addDays(termEndDate, -termEndDate.getDay());

  // 종강일 다음 일요일 (종강일 당일 이후 가장 가까운 일요일) — 새신자교육 시작일
  const eduStartSunday = addDays(termEndDate, ((7 - termEndDate.getDay()) % 7) || 7);

  // 주일예배 1~4회차: worshipWeekSunday에서부터 거꾸로 가며 공휴일인 일요일은 건너뛰고 4번 채움
  const worshipDates = [];
  let worshipCandidate = worshipWeekSunday;
  while(worshipDates.length < 4){
    if(!findHoliday(fmtDateLocal(worshipCandidate))) worshipDates.push(worshipCandidate);
    worshipCandidate = addDays(worshipCandidate, -7);
  }
  pushRoundedEvents_(events, worshipDates.reverse().map(fmtDateLocal), "주일예배", tentative, termEndStr);

  // 새신자교육 1~8회차(일,월,수,목 반복, 2주), eduStartSunday부터 시작해 공휴일은 건너뛰고 채움.
  const eduWeekdayOffsetsA = [0,1,3,4]; // 일(0), 월(1), 수(3), 목(4)
  const eduDatesA = [];
  let week = 0;
  while(eduDatesA.length < 8){
    for(const offset of eduWeekdayOffsetsA){
      if(eduDatesA.length >= 8) break;
      const d = addDays(eduStartSunday, week*7 + offset);
      if(!findHoliday(fmtDateLocal(d))) eduDatesA.push(d);
    }
    week++;
  }
  pushRoundedEvents_(events, eduDatesA.map(fmtDateLocal), "새신자교육", tentative, termEndStr);

  // 새신자교육 8회차가 끝나면 이어서 "새신자 예배" 1~4회차(일,수 반복, 2주)로 전환.
  // 별도 카테고리로 분리해 회차 번호가 1부터 다시 매겨짐. week 카운터를 이어받아서,
  // 공휴일 때문에 1~8회차가 예정보다 늦게 끝나도 그 다음 주부터 자연스럽게 이어짐.
  const eduWeekdayOffsetsB = [0,3]; // 일(0), 수(3)
  const eduDatesB = [];
  while(eduDatesB.length < 4){
    for(const offset of eduWeekdayOffsetsB){
      if(eduDatesB.length >= 4) break;
      const d = addDays(eduStartSunday, week*7 + offset);
      if(!findHoliday(fmtDateLocal(d))) eduDatesB.push(d);
    }
    week++;
  }
  pushRoundedEvents_(events, eduDatesB.map(fmtDateLocal), "새신자 예배", tentative, termEndStr);

  // 종강일
  events.push({ date: termEndStr, category: "종강일", round: null, tentative, termEnd: termEndStr });

  // 서류완료: 종강일 기준 12일째 되는 날(화요일). 다른 회차처럼 이동 가능하도록
  // pushRoundedEvents_를 거쳐 EXCLUDED_DATES/ADDED_DATES(서류완료 카테고리, 이 기수분만)를 반영.
  pushRoundedEvents_(events, [fmtDateLocal(addDays(termEndDate, 12))], "서류완료", tentative, termEndStr, true);

  return events;
}

let EVENTS = [];
function recomputeEvents(){
  EVENTS = CONFIRMED_TERM_ENDS.flatMap(d => computeEvents(d, false));
  if(PLANNED_TERM_END) EVENTS = EVENTS.concat(computeEvents(PLANNED_TERM_END, true));
}

}

function render(){
  document.getElementById('title').textContent = `${YEAR}년 ${MONTH}월`;

  document.getElementById('termLabel').textContent = classStartLabel(YEAR, MONTH);
  const displayClassKey = classStartKey(YEAR, MONTH);

  const cfg = MONTHS[MONTH];
  document.documentElement.setAttribute('data-season', cfg.season);
  document.documentElement.style.setProperty('--season-a', cfg.a);
  document.documentElement.style.setProperty('--season-b', cfg.b);
  document.documentElement.style.setProperty('--season-accent', cfg.accent);
  document.getElementById('seasonBadge').textContent = cfg.emoji;
  if(MONTH !== lastMonthKey){
    buildDecor(cfg);
    lastMonthKey = MONTH;
  }

  const legend = document.getElementById('legend');
  legend.innerHTML = Object.entries(CATEGORIES).map(([name,color]) =>
    `<div class="legend-item"><span class="legend-dot" style="background:${color}"></span>${name}</div>`
  ).join('');

  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  const firstDay = new Date(YEAR, MONTH-1, 1);
  const startWeekday = firstDay.getDay();
  const daysInMonth = new Date(YEAR, MONTH, 0).getDate();
  const daysInPrevMonth = new Date(YEAR, MONTH-1, 0).getDate();

  const todayStr = fmtDateLocal(new Date());
  const categoryOrder = Object.keys(CATEGORIES);

  const totalCells = Math.ceil((startWeekday + daysInMonth) / 7) * 7;

  for(let i=0;i<totalCells;i++){
    const dayOffset = i - startWeekday + 1;
    let cellDate, otherMonth = false;

    if(dayOffset < 1){
      cellDate = new Date(YEAR, MONTH-2, daysInPrevMonth + dayOffset);
      otherMonth = true;
    } else if(dayOffset > daysInMonth){
      cellDate = new Date(YEAR, MONTH, dayOffset - daysInMonth);
      otherMonth = true;
    } else {
      cellDate = new Date(YEAR, MONTH-1, dayOffset);
    }

    const dateStr = fmtDateLocal(cellDate);
    const weekday = cellDate.getDay();

    const cell = document.createElement('div');
    cell.className = 'cell' + (otherMonth ? ' other-month' : '')
      + (weekday===0 ? ' sunday' : '') + (weekday===6 ? ' saturday' : '')
      + (dateStr===todayStr ? ' today' : '');
    cell.addEventListener('click', () => {
      if(!pendingMove) return;
      const { oldDate, category, label, termEnd } = pendingMove;
      cancelMove();
      if(dateStr !== oldDate) moveEvent(oldDate, dateStr, category, label, termEnd);
    });

    const dateRow = document.createElement('div');
    dateRow.className = 'date-row';

    const num = document.createElement('div');
    num.className = 'date-num';
    num.textContent = cellDate.getDate();
    dateRow.appendChild(num);

    const holiday = findHoliday(dateStr);
    if(holiday){
      const hLabel = document.createElement('div');
      hLabel.className = 'holiday-label';
      hLabel.textContent = holiday.name;
      hLabel.title = holiday.name;
      dateRow.appendChild(hLabel);
    }
    cell.appendChild(dateRow);

    const evWrap = document.createElement('div');
    evWrap.className = 'events';
    const dayEvents = EVENTS
      .filter(e => e.date === dateStr && !HIDDEN_TERM_ENDS.has(e.termEnd))
      .sort((a,b) => categoryOrder.indexOf(a.category) - categoryOrder.indexOf(b.category));
    if(dayEvents.length) evWrap.dataset.count = Math.min(dayEvents.length, 3);

    dayEvents.forEach(e => {
      const base = CATEGORIES[e.category] || '#888';
      const termEndForE = parseLocalDate(e.termEnd);
      const isPrimaryCohort = classStartKey(termEndForE.getFullYear(), termEndForE.getMonth()+1) === displayClassKey;
      const el = document.createElement('div');
      el.className = e.tentative ? 'event tentative' : (isPrimaryCohort ? 'event' : 'event other-term');
      if(e.tentative){
        el.style.background = hexToRgba(base, .14);
        el.style.border = `2px dashed ${base}`;
        el.style.color = base;
        el.style.boxShadow = 'none';
      } else if(!isPrimaryCohort){
        // 화면에 보이는 달의 "메인 개강반"이 아닌 다른 개강반 소속 이벤트는 연하게 표시해
        // 중요도(지금 신경 써야 할 기수)를 시각적으로 구분한다.
        el.style.background = hexToRgba(base, .16);
        el.style.border = `1.5px solid ${hexToRgba(base, .45)}`;
        el.style.color = base;
        el.style.boxShadow = 'none';
      } else {
        el.style.background = `linear-gradient(150deg, ${shadeColor(base, 10)}, ${shadeColor(base, -16)})`;
        el.style.boxShadow = `0 6px 14px ${hexToRgba(base, .38)}`;
      }
      el.title = (e.round ? `${e.category} ${e.round}회차` : e.category) + (e.tentative ? ' (예정)' : '') + (!e.tentative && !isPrimaryCohort ? ' (다른 개강반)' : '');

      if(e.tentative){
        const badge = document.createElement('div');
        badge.className = 'tentative-badge';
        badge.textContent = '예정';
        badge.style.background = hexToRgba(base, .18);
        badge.style.border = `1px solid ${base}`;
        badge.style.color = base;
        el.appendChild(badge);
      }

      const icon = document.createElement('div');
      icon.className = 'event-icon';
      icon.textContent = CATEGORY_ICONS[e.category] || '';
      el.appendChild(icon);

      const termEndDate = parseLocalDate(e.termEnd);
      const termLine = document.createElement('div');
      termLine.className = 'event-term';
      termLine.textContent = classStartLabel(termEndDate.getFullYear(), termEndDate.getMonth() + 1);
      termLine.title = termLine.textContent;

      if(e.round){
        const line = document.createElement('div');
        line.className = 'event-line';
        line.innerHTML = `<span class="event-cat">${e.category}</span><span class="round-num">${e.round}</span><span class="round-unit">회차</span>`;
        el.appendChild(line);
        el.appendChild(termLine);

        const excludeBtn = document.createElement('button');
        excludeBtn.className = 'event-exclude-btn';
        excludeBtn.textContent = '×';
        excludeBtn.title = '이 회차를 특이 일정으로 빼기';
        excludeBtn.onclick = (evt) => { evt.stopPropagation(); excludeEvent(e.date, `${e.category} ${e.round}회차`, e.termEnd); };
        el.appendChild(excludeBtn);

        const moveBtn = document.createElement('button');
        moveBtn.className = 'event-move-btn';
        moveBtn.textContent = '↔';
        moveBtn.title = '이 회차를 다른 날짜로 이동';
        moveBtn.onclick = (evt) => { evt.stopPropagation(); startMove(e.date, e.category, `${e.category} ${e.round}회차`, e.termEnd); };
        el.appendChild(moveBtn);
      } else {
        const cat = document.createElement('div');
        cat.className = 'event-cat event-solo';
        cat.textContent = e.category;
        el.appendChild(cat);
        el.appendChild(termLine);

        if(e.category === '서류완료'){
          const moveBtn = document.createElement('button');
          moveBtn.className = 'event-move-btn';
          moveBtn.textContent = '↔';
          moveBtn.title = '이 일정을 다른 날짜로 이동';
          moveBtn.onclick = (evt) => { evt.stopPropagation(); startMove(e.date, e.category, e.category, e.termEnd); };
          el.appendChild(moveBtn);
        }
      }

      evWrap.appendChild(el);
    });
    cell.appendChild(evWrap);

    grid.appendChild(cell);
  }
}

// 지금 화면에 보이는 달력을 PNG 이미지로 저장 (외부 라이브러리 없이,
// 실제 DOM을 SVG foreignObject에 담아 캔버스로 그려서 다운로드)
function exportImage(){
  try{
    const source = document.querySelector('.wrap');
    const clone = source.cloneNode(true);
    // .term-filter 안의 체크박스(<input>)는 HTML로 직렬화되면 닫는 태그가 없는 void
    // element라서, SVG foreignObject가 요구하는 엄격한 XML 파싱이 깨져 이미지 로드가
    // 실패한다(예: input이 label과 태그 불일치로 판정됨) — 그래서 통째로 제외한다.
    clone.querySelectorAll('.sidebar, .term-bar, .nav-btns, .term-filter').forEach(el => el.remove());
    clone.style.maxWidth = 'none';
    clone.style.width = '1100px';

    const styleText = Array.from(document.querySelectorAll('style')).map(s => s.textContent).join('\n');
    const rootStyle = getComputedStyle(document.documentElement);
    const varNames = ['--bg','--card','--border','--text','--muted','--accent','--today','--sun','--sat','--season-a','--season-b','--season-accent'];
    const varsCss = ':root{' + varNames.map(v => `${v}:${rootStyle.getPropertyValue(v).trim()};`).join('') + '}';

    const host = document.createElement('div');
    host.style.cssText = 'position:fixed;left:-99999px;top:0;';
    host.appendChild(clone);
    document.body.appendChild(host);
    const rect = clone.getBoundingClientRect();
    const w = Math.ceil(rect.width) || 1000;
    const h = Math.ceil(rect.height) || 600;
    const innerHtml = clone.outerHTML;
    document.body.removeChild(host);

    const pad = 24;
    const totalW = w + pad*2;
    const totalH = h + pad*2;
    const svgString =
      `<svg xmlns="http://www.w3.org/2000/svg" width="${totalW}" height="${totalH}">` +
      `<foreignObject width="100%" height="100%">` +
      `<div xmlns="http://www.w3.org/1999/xhtml" style="width:${totalW}px;height:${totalH}px;background:linear-gradient(160deg, var(--season-a), var(--season-b) 55%, var(--bg) 100%);padding:${pad}px;box-sizing:border-box;">` +
      `<style>${varsCss}\n${styleText}</style>${innerHtml}` +
      `</div></foreignObject></svg>`;

    // blob: URL로 SVG를 로드하면 크롬에서 캔버스가 오염(tainted)되어 저장이
    // 조용히 실패하는 경우가 있어, data URI로 직접 인코딩해서 우회한다.
    const svgUrl = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgString);
    const img = new Image();
    img.onload = () => {
      try{
        const scale = 2;
        const canvas = document.createElement('canvas');
        canvas.width = totalW * scale;
        canvas.height = totalH * scale;
        const ctx = canvas.getContext('2d');
        ctx.scale(scale, scale);
        ctx.drawImage(img, 0, 0, totalW, totalH);

        canvas.toBlob(blob => {
          if(!blob){
            alert('이미지 변환에 실패했습니다(빈 결과). 콘솔(F12)의 오류 메시지를 확인해주세요.');
            return;
          }
          const link = document.createElement('a');
          link.download = `새신자교육_학사일정_${YEAR}년${MONTH}월.png`;
          link.href = URL.createObjectURL(blob);
          document.body.appendChild(link);
          link.click();
          link.remove();
        }, 'image/png');
      }catch(err){
        alert('이미지 저장 중 오류: ' + err.message + '\n콘솔(F12)에서 자세한 내용을 확인해주세요.');
        console.error(err);
      }
    };
    img.onerror = (err) => {
      alert('달력 이미지를 그리는 데 실패했습니다. 콘솔(F12)의 오류 메시지를 확인해주세요.');
      console.error('exportImage img load error', err);
    };
    img.src = svgUrl;
  }catch(err){
    alert('이미지 저장 준비 중 오류: ' + err.message + '\n콘솔(F12)에서 자세한 내용을 확인해주세요.');
    console.error(err);
  }
}

function changeMonth(delta){
  MONTH += delta;
  if(MONTH > 12){ MONTH = 1; YEAR++; }
  if(MONTH < 1){ MONTH = 12; YEAR--; }
  render();
}

function jumpToDate(dateStr){
  const d = parseLocalDate(dateStr);
  YEAR = d.getFullYear();
  MONTH = d.getMonth() + 1;
}

const confirmedInput = document.getElementById('confirmedInput');
const plannedInput = document.getElementById('plannedInput');
plannedInput.value = PLANNED_TERM_END || '';

function renderConfirmedList(){
  const wrap = document.getElementById('confirmedList');
  wrap.innerHTML = '';
  CONFIRMED_TERM_ENDS.slice().sort().forEach(dateStr => {
    const chip = document.createElement('span');
    chip.className = 'confirmed-chip';
    chip.textContent = dateStr + ' ';
    const btn = document.createElement('button');
    btn.textContent = '×';
    btn.title = '이 확정 종강일 삭제';
    btn.onclick = () => removeConfirmed(dateStr);
    chip.appendChild(btn);
    wrap.appendChild(chip);
  });
  const statusEl = document.getElementById('confirmedSyncStatus');
  if(statusEl){
    statusEl.textContent = CONFIRMED_API_URL ? '🔗 구글시트와 공유됨' : '💻 이 브라우저에만 저장됨(공유 안 됨)';
  }
}

// 오늘 기준 2개월 넘게 지난 추가 회차는 이미 달력에도 표시되고 있어 "확정된" 지난 일정으로
// 보고 사이드바 목록에서는 기본적으로 숨김("더보기"로 펼치면 다시 볼 수 있음) — 최근/예정 항목만
// 남겨서 목록이 계속 길어지는 걸 막는다.
const ADDED_LIST_STALE_MONTHS = 2;
let addedListExpanded = false;

function isAddedItemStale(dateStr){
  const cutoff = new Date();
  cutoff.setMonth(cutoff.getMonth() - ADDED_LIST_STALE_MONTHS);
  return new Date(dateStr+'T00:00:00') < cutoff;
}

function renderAddedList(){
  const wrap = document.getElementById('addedList');
  if(!wrap) return;
  wrap.innerHTML = '';
  const sorted = ADDED_DATES.slice().sort((a,b) => a.date < b.date ? -1 : a.date > b.date ? 1 : 0);
  const staleCount = sorted.filter(item => isAddedItemStale(item.date)).length;
  const visible = addedListExpanded ? sorted : sorted.filter(item => !isAddedItemStale(item.date));
  visible.forEach(item => {
    const chip = document.createElement('span');
    chip.className = 'confirmed-chip';
    chip.textContent = `${item.date} (${item.category}, ${item.termEnd} 기수) `;
    const btn = document.createElement('button');
    btn.textContent = '×';
    btn.title = '이 추가 회차 삭제';
    btn.onclick = () => removeExtraEvent(item.date, item.termEnd);
    chip.appendChild(btn);
    wrap.appendChild(chip);
  });
  if(staleCount > 0){
    const toggle = document.createElement('button');
    toggle.className = 'list-toggle-btn';
    toggle.textContent = addedListExpanded ? '접기 ▲' : `지난 일정 더보기 (${staleCount}개, 확정됨) ▼`;
    toggle.onclick = () => { addedListExpanded = !addedListExpanded; renderAddedList(); };
    wrap.appendChild(toggle);
  }
}

// 사이드바 "회차 추가" 폼의 기수 선택 드롭다운을 CONFIRMED_TERM_ENDS(+예정)로 채움 —
// 확정/예정 종강일이 바뀔 때마다 다시 호출해서 최신 목록을 유지.
function renderTermEndOptions(){
  const sel = document.getElementById('addExtraTermEnd');
  if(!sel) return;
  const prev = sel.value;
  const confirmedOpts = CONFIRMED_TERM_ENDS.slice().sort().map(d => `<option value="${d}">${d} 기수</option>`).join('');
  const plannedOpt = PLANNED_TERM_END ? `<option value="${PLANNED_TERM_END}">${PLANNED_TERM_END} 기수(예정)</option>` : '';
  sel.innerHTML = confirmedOpts + plannedOpt;
  if(Array.from(sel.options).some(o => o.value === prev)) sel.value = prev;
}

// 기수(개강반) 필터 — 여러 기수가 동시에 떠서 달력이 번잡할 때, 체크 해제한 기수의
// 이벤트는 달력에서 아예 숨긴다. 이 브라우저에만 저장되는 "보기 설정"이라 구글시트와는
// 공유하지 않음(사람마다 보고 싶은 기수가 다를 수 있으므로).
const TERM_FILTER_KEY = 'newcomerEduHiddenTermEnds';
function loadHiddenTermEnds(){
  return new Set(JSON.parse(localStorage.getItem(TERM_FILTER_KEY) || '[]'));
}
let HIDDEN_TERM_ENDS = loadHiddenTermEnds();

function renderTermFilter(){
  const wrap = document.getElementById('termFilter');
  if(!wrap) return;

  const allTermEnds = CONFIRMED_TERM_ENDS.slice().sort();
  if(PLANNED_TERM_END && !allTermEnds.includes(PLANNED_TERM_END)) allTermEnds.push(PLANNED_TERM_END);

  // 더 이상 존재하지 않는 기수의 숨김 기록은 정리(무한정 쌓이지 않도록)
  const validSet = new Set(allTermEnds);
  let changed = false;
  Array.from(HIDDEN_TERM_ENDS).forEach(te => {
    if(!validSet.has(te)){ HIDDEN_TERM_ENDS.delete(te); changed = true; }
  });
  if(changed) localStorage.setItem(TERM_FILTER_KEY, JSON.stringify(Array.from(HIDDEN_TERM_ENDS)));

  wrap.innerHTML = '';
  allTermEnds.forEach(te => {
    const d = parseLocalDate(te);
    const classStart = new Date(d.getFullYear(), d.getMonth() - CLASS_DURATION_MONTHS, 1);
    const isPlanned = te === PLANNED_TERM_END;
    const label = document.createElement('label');
    const checked = !HIDDEN_TERM_ENDS.has(te);
    label.className = checked ? '' : 'term-filter-off';
    label.title = classStartLabel(d.getFullYear(), d.getMonth()+1) + (isPlanned ? ' (예정)' : '');

    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = checked;
    cb.onchange = () => {
      if(cb.checked) HIDDEN_TERM_ENDS.delete(te); else HIDDEN_TERM_ENDS.add(te);
      localStorage.setItem(TERM_FILTER_KEY, JSON.stringify(Array.from(HIDDEN_TERM_ENDS)));
      render();
    };
    label.appendChild(cb);
    label.appendChild(document.createTextNode(`${classStart.getMonth()+1}월개강반` + (isPlanned ? '(예정)' : '')));
    wrap.appendChild(label);
  });
}

async function excludeEvent(dateStr, label, termEnd){
  if(!confirm(`${label}(${dateStr}, ${termEnd} 기수)을 이번 기수에서 빼시겠어요?\n이후 회차 번호가 하나씩 당겨집니다.`)) return;
  if(CONFIRMED_API_URL){
    const token = getWriteToken(true);
    try{
      const res = await jsonpRequest(`${CONFIRMED_API_URL}?action=exclude&date=${encodeURIComponent(dateStr)}&termEnd=${encodeURIComponent(termEnd)}&token=${encodeURIComponent(token)}`);
      if(!res.ok){
        localStorage.removeItem(WRITE_TOKEN_KEY);
        alert('처리 실패: ' + res.error);
        return;
      }
      EXCLUDED_DATES = res.excluded || [];
    }catch(err){
      alert('구글시트에 반영하지 못했습니다: ' + err.message);
      return;
    }
  } else {
    if(!EXCLUDED_DATES.some(x => x.date === dateStr && x.termEnd === termEnd)){
      EXCLUDED_DATES.push({ date: dateStr, termEnd });
      localStorage.setItem(EXCLUDED_KEY, JSON.stringify(EXCLUDED_DATES));
    }
  }
  recomputeEvents();
  render();
}

async function addExtraEvent(){
  const category = document.getElementById('addExtraCategory').value;
  const termEnd = document.getElementById('addExtraTermEnd').value;
  const dateInput = document.getElementById('addExtraInput');
  const v = dateInput.value;
  if(!v || !termEnd) return;
  dateInput.value = '';
  if(CONFIRMED_API_URL){
    const token = getWriteToken(true);
    try{
      const res = await jsonpRequest(`${CONFIRMED_API_URL}?action=addExtra&date=${encodeURIComponent(v)}&category=${encodeURIComponent(category)}&termEnd=${encodeURIComponent(termEnd)}&token=${encodeURIComponent(token)}`);
      if(!res.ok){
        localStorage.removeItem(WRITE_TOKEN_KEY);
        alert('저장 실패: ' + res.error);
        return;
      }
      ADDED_DATES = res.added || [];
      EXCLUDED_DATES = res.excluded || EXCLUDED_DATES; // 같은 기수의 같은 날짜가 제외 목록에 있었다면 서버가 자동으로 정리해서 돌려줌
    }catch(err){
      alert('구글시트에 저장하지 못했습니다: ' + err.message);
      return;
    }
  } else {
    if(!ADDED_DATES.some(a => a.date === v && a.termEnd === termEnd)){
      ADDED_DATES.push({ date: v, category, termEnd });
      localStorage.setItem(ADDED_KEY, JSON.stringify(ADDED_DATES));
    }
    // 로컬 전용 모드에서도 마찬가지로, 같은 기수에 다시 추가하면 제외 목록에서 자동으로 빠짐
    if(EXCLUDED_DATES.some(x => x.date === v && x.termEnd === termEnd)){
      EXCLUDED_DATES = EXCLUDED_DATES.filter(x => !(x.date === v && x.termEnd === termEnd));
      localStorage.setItem(EXCLUDED_KEY, JSON.stringify(EXCLUDED_DATES));
    }
  }
  recomputeEvents();
  jumpToDate(v);
  renderAddedList();
  render();
}

async function removeExtraEvent(dateStr, termEnd){
  if(CONFIRMED_API_URL){
    const token = getWriteToken(true);
    try{
      const res = await jsonpRequest(`${CONFIRMED_API_URL}?action=removeExtra&date=${encodeURIComponent(dateStr)}&termEnd=${encodeURIComponent(termEnd)}&token=${encodeURIComponent(token)}`);
      if(!res.ok){
        localStorage.removeItem(WRITE_TOKEN_KEY);
        alert('삭제 실패: ' + res.error);
        return;
      }
      ADDED_DATES = res.added || [];
    }catch(err){
      alert('구글시트에서 삭제하지 못했습니다: ' + err.message);
      return;
    }
  } else {
    ADDED_DATES = ADDED_DATES.filter(a => !(a.date === dateStr && a.termEnd === termEnd));
    localStorage.setItem(ADDED_KEY, JSON.stringify(ADDED_DATES));
  }
  recomputeEvents();
  renderAddedList();
  render();
}

// ── 회차 이동(↔ 버튼) ──
// 기존 "제외"+"추가"를 한 번의 클릭 흐름으로 합친 것. 내부적으로는 여전히
// exclude(옛 날짜)/addExtra(새 날짜) 두 액션을 순서대로 호출한다(서버 API가 별도라서).
// 이미 한 번 이동된(=ADDED_DATES에 있는) 회차를 다시 옮길 때는 exclude가 아니라
// removeExtra로 지워야 흔적이 안 남으므로 두 경우를 구분한다.
// 제외(옛 날짜)+추가(새 날짜)를 서버 요청 1번으로 처리(action=move) — 예전엔 두 번
// 순차로 요청해서 느렸던 것을 한 번으로 줄임. 로컬 전용(공유 안 함) 모드에서는
// 네트워크 요청이 애초에 없으니 그냥 로컬 배열만 동일한 순서로 갱신.
async function doMoveDate_(oldDate, newDate, category, termEnd){
  if(CONFIRMED_API_URL){
    const token = getWriteToken(true);
    const res = await jsonpRequest(`${CONFIRMED_API_URL}?action=move&date=${encodeURIComponent(oldDate)}&newDate=${encodeURIComponent(newDate)}&category=${encodeURIComponent(category)}&termEnd=${encodeURIComponent(termEnd)}&token=${encodeURIComponent(token)}`);
    if(!res.ok){ localStorage.removeItem(WRITE_TOKEN_KEY); throw new Error(res.error); }
    EXCLUDED_DATES = res.excluded || [];
    ADDED_DATES = res.added || [];
  } else {
    const wasManuallyAdded = ADDED_DATES.some(a => a.date === oldDate && a.category === category && a.termEnd === termEnd);
    if(wasManuallyAdded){
      ADDED_DATES = ADDED_DATES.filter(a => !(a.date === oldDate && a.termEnd === termEnd));
    } else if(!EXCLUDED_DATES.some(x => x.date === oldDate && x.termEnd === termEnd)){
      EXCLUDED_DATES.push({ date: oldDate, termEnd });
    }
    if(!ADDED_DATES.some(a => a.date === newDate && a.termEnd === termEnd)){
      ADDED_DATES.push({ date: newDate, category, termEnd });
    }
    EXCLUDED_DATES = EXCLUDED_DATES.filter(x => !(x.date === newDate && x.termEnd === termEnd));
    localStorage.setItem(EXCLUDED_KEY, JSON.stringify(EXCLUDED_DATES));
    localStorage.setItem(ADDED_KEY, JSON.stringify(ADDED_DATES));
  }
}

// 회차 박스의 ↔ 버튼을 누르면 "이동 모드"로 들어간다 — 별도 날짜 선택창/확인창 없이,
// 달력에서 원하는 날짜 칸을 바로 클릭하면 그 자리로 즉시 이동된다(Esc 또는 배너의
// 취소 버튼으로 취소, 같은 날짜를 다시 클릭해도 취소). termEnd는 이 회차가 어느
// 기수 소속인지 기억해뒀다가, 다른 기수 계산에 새어 들어가지 않도록 그대로 넘긴다.
let pendingMove = null;

function startMove(oldDate, category, label, termEnd){
  pendingMove = { oldDate, category, label, termEnd };
  document.getElementById('grid').classList.add('move-mode');
  const banner = document.getElementById('moveBanner');
  banner.style.display = 'flex';
  document.getElementById('moveBannerText').textContent = `${label} (${termEnd} 기수) 이동 중 — 달력에서 새 날짜를 클릭하세요`;
}

function cancelMove(){
  pendingMove = null;
  document.getElementById('grid').classList.remove('move-mode');
  document.getElementById('moveBanner').style.display = 'none';
}

document.addEventListener('keydown', (evt) => {
  if(evt.key === 'Escape' && pendingMove) cancelMove();
});

async function moveEvent(oldDate, newDate, category, label, termEnd){
  const banner = document.getElementById('moveBanner');
  const bannerText = document.getElementById('moveBannerText');
  const cancelBtn = banner.querySelector('button');
  banner.style.display = 'flex';
  cancelBtn.style.display = 'none';
  bannerText.textContent = `${label} 이동 처리 중…`;
  try{
    await doMoveDate_(oldDate, newDate, category, termEnd);
  }catch(err){
    alert('이동 처리 중 오류: ' + err.message);
  }
  cancelBtn.style.display = '';
  banner.style.display = 'none';
  recomputeEvents();
  jumpToDate(newDate);
  renderAddedList();
  render();
}

async function addConfirmed(){
  const v = confirmedInput.value;
  if(!v) return;
  confirmedInput.value = '';
  if(CONFIRMED_API_URL){
    const token = getWriteToken(true);
    try{
      const res = await jsonpRequest(`${CONFIRMED_API_URL}?action=add&date=${encodeURIComponent(v)}&token=${encodeURIComponent(token)}`);
      if(!res.ok){
        localStorage.removeItem(WRITE_TOKEN_KEY);
        alert('저장 실패: ' + res.error);
        CONFIRMED_TERM_ENDS = res.dates || CONFIRMED_TERM_ENDS;
        EXCLUDED_DATES = res.excluded || EXCLUDED_DATES;
        ADDED_DATES = res.added || ADDED_DATES;
        recomputeEvents();
        renderConfirmedList();
        renderAddedList();
        renderTermEndOptions();
        renderTermFilter();
        render();
        return;
      }
      CONFIRMED_TERM_ENDS = res.dates;
      EXCLUDED_DATES = res.excluded || EXCLUDED_DATES;
      ADDED_DATES = res.added || ADDED_DATES;
    }catch(err){
      alert('구글시트에 저장하지 못했습니다: ' + err.message);
      return;
    }
  } else {
    if(!CONFIRMED_TERM_ENDS.includes(v)){
      CONFIRMED_TERM_ENDS.push(v);
      localStorage.setItem(CONFIRMED_KEY, JSON.stringify(CONFIRMED_TERM_ENDS));
    }
  }
  recomputeEvents();
  jumpToDate(v);
  renderConfirmedList();
  renderAddedList();
  renderTermEndOptions();
  renderTermFilter();
  render();
}

async function removeConfirmed(dateStr){
  if(CONFIRMED_API_URL){
    const token = getWriteToken(true);
    try{
      const res = await jsonpRequest(`${CONFIRMED_API_URL}?action=remove&date=${encodeURIComponent(dateStr)}&token=${encodeURIComponent(token)}`);
      if(!res.ok){
        localStorage.removeItem(WRITE_TOKEN_KEY);
        alert('삭제 실패: ' + res.error);
        CONFIRMED_TERM_ENDS = res.dates || CONFIRMED_TERM_ENDS;
        EXCLUDED_DATES = res.excluded || EXCLUDED_DATES;
        ADDED_DATES = res.added || ADDED_DATES;
        recomputeEvents();
        renderConfirmedList();
        renderAddedList();
        renderTermEndOptions();
        renderTermFilter();
        render();
        return;
      }
      CONFIRMED_TERM_ENDS = res.dates;
      EXCLUDED_DATES = res.excluded || EXCLUDED_DATES;
      ADDED_DATES = res.added || ADDED_DATES;
    }catch(err){
      alert('구글시트에서 삭제하지 못했습니다: ' + err.message);
      return;
    }
  } else {
    CONFIRMED_TERM_ENDS = CONFIRMED_TERM_ENDS.filter(d => d !== dateStr);
    localStorage.setItem(CONFIRMED_KEY, JSON.stringify(CONFIRMED_TERM_ENDS));
  }
  recomputeEvents();
  renderConfirmedList();
  renderAddedList();
  renderTermEndOptions();
  renderTermFilter();
  render();
}

if(CONFIRMED_API_URL){
  jsonpRequest(CONFIRMED_API_URL).then(res => {
    CONFIRMED_TERM_ENDS = res.dates || [];
    EXCLUDED_DATES = res.excluded || [];
    ADDED_DATES = res.added || [];
    recomputeEvents();
    renderConfirmedList();
    renderAddedList();
    renderTermEndOptions();
    renderTermFilter();
    render();
  }).catch(err => {
    alert('구글시트에서 확정 종강일을 불러오지 못했습니다: ' + err.message);
  });
} else {
  renderConfirmedList();
  renderAddedList();
  renderTermEndOptions();
  renderTermFilter();
}

plannedInput.addEventListener('change', () => {
  PLANNED_TERM_END = plannedInput.value || null;
  recomputeEvents();
  if(PLANNED_TERM_END) jumpToDate(PLANNED_TERM_END);
  renderTermEndOptions();
  renderTermFilter();
  render();
});

function clearPlanned(){
  PLANNED_TERM_END = null;
  plannedInput.value = '';
  recomputeEvents();
  renderTermEndOptions();
  renderTermFilter();
  render();
}

render();
</script>
